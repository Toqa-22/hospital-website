<html lang="ar">
<head>

    <link rel="stylesheet" href="assets/css/form-style.css">

    
</head>
<body>

<div class="header">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="page-title">مستشفى ابراء قسم العلاقات</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="index.html">الرئيسية</a>
    <a href="relation_dep/search.html">البحث</a>
    <a href="relation_dep/daily-events.html">تسجيل الأحداث اليومية</a>
    <a href="relation_dep/today_event.html">احداث اليوم</a>
    <a href="relation_dep/feedback.html">الشكاوى / الاقتراحات / الشكر</a>
    <a href="form.html">تسجيل شكر/إقتراح/شكوى</a>
    <a href="index.html">تسجيل خروج</a>
</div>

<div id="content" class="content">
    <div class="form-container">
        <h2>تسجيل شكر/إقتراح/شكوى</h2>
        <form id="feedbackForm">
    
    <label>إسم المريض</label>
    <input type="text" id="patient_name" required>

    <label>رقم الملف</label>
    <input type="text" id="file_number" required>

    <label>إسم المبلغ/المشتكي</label>
    <input type="text" id="reporter_name" required>

    <label>رقم الهاتف</label>
    <input type="tel" id="phone_number">

    <label>القسم:</label>
    <select id="department_select" required>
        <option value="" disabled selected>اختر القسم...</option>
        </select>

    <label>نوع الحالة</label>
    <div class="radio-group">
        <label class="radio-label btn-thanks">
            <input type="radio" name="feedback_type" value="شكر"> <span>شكر</span>
        </label>
        <label class="radio-label btn-suggestion">
            <input type="radio" name="feedback_type" value="اقتراح"> <span>إقتراح</span>
        </label>
        <label class="radio-label btn-complaint">
            <input type="radio" name="feedback_type" value="شكوى"> <span>شكوى</span>
        </label>
    </div>

    <label>الوصف</label>
    <textarea id="notes" rows="4"></textarea>

    <button type="submit" class="submit-btn">تسجيل</button>
</form>
    </div>
</div>

<div class="footer">© Public Relations System</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script defer src="assets/js/layout.js"></script>
    <script src="assets/js/form-logic.js"></script>
</body>
</html>
